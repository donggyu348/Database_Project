<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>가계부 - 로그인</title>
  <link rel="stylesheet" href="/assets/css/login.css">
</head>
<body>

<div class="container">
  <div class="logo">
    <h1>가계부</h1>
    <p>내 수입과 지출을 한눈에</p>
  </div>

  <div class="tab-group">
    <div class="tab active" id="tab-login" onclick="switchTab('login')">로그인</div>
    <div class="tab" id="tab-register" onclick="switchTab('register')">회원가입</div>
  </div>

  <!-- 로그인 폼 -->
  <div id="form-login">
    <div class="form-group">
      <label>아이디</label>
      <input type="text" id="login-user-id" placeholder="아이디 입력">
    </div>
    <div class="form-group">
      <label>비밀번호</label>
      <input type="password" id="login-password" placeholder="비밀번호 입력" onkeydown="if(event.key==='Enter') login()">
    </div>
    <button type="button" class="btn" onclick="login()">로그인</button>
    <div class="error-msg" id="login-error"></div>
  </div>

  <!-- 회원가입 폼 -->
  <div id="form-register" class="hidden">
    <div class="form-group">
      <label>아이디</label>
      <input type="text" id="reg-user-id" placeholder="아이디 입력 (예: hong123)">
    </div>
    <div class="form-group">
      <label>닉네임</label>
      <input type="text" id="reg-nickname" placeholder="닉네임 입력">
    </div>
    <div class="form-group">
      <label>이메일</label>
      <input type="email" id="reg-email" placeholder="이메일 입력">
    </div>
    <div class="form-group">
      <label>비밀번호</label>
      <input type="password" id="reg-password" placeholder="비밀번호 입력 (6자 이상)">
    </div>
    <button type="button" class="btn" onclick="register()">회원가입</button>
    <div class="error-msg" id="reg-error"></div>
    <div class="success-msg" id="reg-success"></div>
  </div>
</div>

<script src="/assets/js/login.js"></script>
</body>
</html>
