<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>가계부 - 로그인</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f4f6f9;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .container {
      background: white;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      padding: 48px 40px 40px;
      width: 100%;
      max-width: 400px;
    }

    .logo {
      text-align: center;
      margin-bottom: 32px;
    }

    .logo h1 {
      font-size: 28px;
      color: #4a90e2;
      font-weight: 700;
    }

    .logo p {
      font-size: 14px;
      color: #aaa;
      margin-top: 6px;
    }

    .tab-group {
      display: flex;
      border-bottom: 2px solid #f0f0f0;
      margin-bottom: 28px;
    }

    .tab {
      flex: 1;
      text-align: center;
      padding: 10px;
      cursor: pointer;
      font-size: 15px;
      color: #aaa;
      font-weight: 500;
      transition: color 0.2s;
    }

    .tab.active {
      color: #4a90e2;
      border-bottom: 2px solid #4a90e2;
      margin-bottom: -2px;
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-group label {
      display: block;
      font-size: 13px;
      color: #666;
      margin-bottom: 6px;
      font-weight: 500;
    }

    .form-group input {
      width: 100%;
      padding: 11px 14px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    .form-group input:focus {
      border-color: #4a90e2;
    }

    .btn {
      width: 100%;
      padding: 13px;
      background: #4a90e2;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.2s;
    }

    .btn:hover { background: #357abd; }

    .error-msg {
      color: #e25c5c;
      font-size: 13px;
      margin-top: 12px;
      text-align: center;
      min-height: 18px;
    }

    .hidden { display: none; }

    .success-msg {
      color: #2ecc71;
      font-size: 13px;
      margin-top: 12px;
      text-align: center;
      min-height: 18px;
    }
  </style>
</head>
<body>

<div class="container">
  <div class="logo">
    <h1>가계부</h1>
    <p>내 수입과 지출을 한눈에</p>
  </div>

  <div class="tab-group">
    <div class="tab active" id="tab-login" onclick="switchTab('login')">로그인</div>
    <div class="tab" id="tab-register" onclick="switchTab('register')">회원가입</div>
  </div>

  <!-- 로그인 폼 -->
  <div id="form-login">
    <div class="form-group">
      <label>이메일</label>
      <input type="email" id="login-email" placeholder="이메일 입력">
    </div>
    <div class="form-group">
      <label>비밀번호</label>
      <input type="password" id="login-password" placeholder="비밀번호 입력" onkeydown="if(event.key==='Enter') login()">
    </div>
    <button type="button" class="btn" onclick="login()">로그인</button>
    <div class="error-msg" id="login-error"></div>
  </div>

  <!-- 회원가입 폼 -->
  <div id="form-register" class="hidden">
    <div class="form-group">
      <label>이름</label>
      <input type="text" id="reg-name" placeholder="이름 입력">
    </div>
    <div class="form-group">
      <label>이메일</label>
      <input type="email" id="reg-email" placeholder="이메일 입력">
    </div>
    <div class="form-group">
      <label>비밀번호</label>
      <input type="password" id="reg-password" placeholder="비밀번호 입력 (6자 이상)">
    </div>
    <button type="button" class="btn" onclick="register()">회원가입</button>
    <div class="error-msg" id="reg-error"></div>
    <div class="success-msg" id="reg-success"></div>
  </div>
</div>

<script>
  // 이미 로그인된 경우 바로 이동
  if (localStorage.getItem('user')) {
    window.location.href = '/';
  }

  function switchTab(tab) {
    document.getElementById('tab-login').classList.toggle('active', tab === 'login');
    document.getElementById('tab-register').classList.toggle('active', tab === 'register');
    document.getElementById('form-login').classList.toggle('hidden', tab !== 'login');
    document.getElementById('form-register').classList.toggle('hidden', tab !== 'register');
    clearMessages();
  }

  function clearMessages() {
    ['login-error', 'reg-error', 'reg-success'].forEach(id => {
      document.getElementById(id).textContent = '';
    });
  }

  function login() {
    const email = document.getElementById('login-email').value.trim();
    const password = document.getElementById('login-password').value;
    const errorEl = document.getElementById('login-error');

    if (!email || !password) {
      errorEl.textContent = '이메일과 비밀번호를 입력해주세요.';
      return;
    }

    // 임시: localStorage에 저장된 유저 목록에서 확인
    const users = JSON.parse(localStorage.getItem('users') || '[]');
    const user = users.find(u => u.email === email && u.password === password);

    if (!user) {
      errorEl.textContent = '이메일 또는 비밀번호가 올바르지 않습니다.';
      return;
    }

    localStorage.setItem('user', JSON.stringify({ name: user.name, email: user.email }));
    window.location.href = '/app.html';
  }

  function register() {
    const name = document.getElementById('reg-name').value.trim();
    const email = document.getElementById('reg-email').value.trim();
    const password = document.getElementById('reg-password').value;
    const errorEl = document.getElementById('reg-error');
    const successEl = document.getElementById('reg-success');

    if (!name || !email || !password) {
      errorEl.textContent = '모든 항목을 입력해주세요.';
      return;
    }
    if (password.length < 6) {
      errorEl.textContent = '비밀번호는 6자 이상이어야 합니다.';
      return;
    }

    const users = JSON.parse(localStorage.getItem('users') || '[]');
    if (users.find(u => u.email === email)) {
      errorEl.textContent = '이미 사용 중인 이메일입니다.';
      return;
    }

    users.push({ name, email, password });
    localStorage.setItem('users', JSON.stringify(users));

    errorEl.textContent = '';
    successEl.textContent = '회원가입 완료! 로그인해주세요.';
    setTimeout(() => switchTab('login'), 1200);
  }
</script>

</body>
</html>
