<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>가계부 - 내 가계부</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f4f6f9;
      color: #333;
    }

    header {
      background: #4a90e2;
      color: white;
      padding: 16px 32px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    header h1 { font-size: 24px; }

    .header-right { display: flex; align-items: center; gap: 16px; }

    .logout-btn {
      background: rgba(255,255,255,0.2);
      color: white;
      border: 1px solid rgba(255,255,255,0.4);
      padding: 6px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
    }
    .logout-btn:hover { background: rgba(255,255,255,0.35); }

    .summary {
      display: flex;
      gap: 20px;
      padding: 24px 32px;
    }

    .card {
      flex: 1;
      background: white;
      border-radius: 12px;
      padding: 20px 24px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.07);
    }

    .card h3 { font-size: 14px; color: #888; margin-bottom: 8px; }
    .card .amount { font-size: 28px; font-weight: bold; }
    .card.income .amount { color: #4a90e2; }
    .card.expense .amount { color: #e25c5c; }
    .card.balance .amount { color: #2ecc71; }

    .main-content {
      padding: 0 32px 32px;
      display: flex;
      gap: 20px;
    }

    .transaction-section {
      flex: 2;
      background: white;
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.07);
    }

    .transaction-section h2 { font-size: 18px; margin-bottom: 16px; }

    .add-form {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .add-form input,
    .add-form select {
      padding: 8px 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
      flex: 1;
      min-width: 100px;
    }

    .add-form button {
      padding: 8px 20px;
      background: #4a90e2;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
    }

    .add-form button:hover { background: #357abd; }

    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    th {
      text-align: left;
      padding: 10px 12px;
      border-bottom: 2px solid #f0f0f0;
      color: #888;
      font-weight: 600;
    }
    td { padding: 12px; border-bottom: 1px solid #f5f5f5; }
    tr:last-child td { border-bottom: none; }

    .type-income { color: #4a90e2; font-weight: bold; }
    .type-expense { color: #e25c5c; font-weight: bold; }

    .delete-btn {
      background: none;
      border: none;
      color: #ccc;
      cursor: pointer;
      font-size: 16px;
    }
    .delete-btn:hover { color: #e25c5c; }

    .chart-section {
      flex: 1;
      background: white;
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.07);
    }
    .chart-section h2 { font-size: 18px; margin-bottom: 16px; }

    .category-bar { margin-bottom: 14px; }
    .category-bar .label {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      margin-bottom: 4px;
    }
    .bar-bg { background: #f0f0f0; border-radius: 6px; height: 10px; overflow: hidden; }
    .bar-fill { height: 100%; border-radius: 6px; background: #4a90e2; transition: width 0.4s; }
  </style>
</head>
<body>

<header>
  <h1>가계부</h1>
  <div class="header-right">
    <span id="user-name"></span>
    <button type="button" class="logout-btn" onclick="logout()">로그아웃</button>
  </div>
</header>

<div class="summary">
  <div class="card income">
    <h3>이번 달 수입</h3>
    <div class="amount" id="total-income">0 원</div>
  </div>
  <div class="card expense">
    <h3>이번 달 지출</h3>
    <div class="amount" id="total-expense">0 원</div>
  </div>
  <div class="card balance">
    <h3>잔액</h3>
    <div class="amount" id="total-balance">0 원</div>
  </div>
</div>

<div class="main-content">
  <div class="transaction-section">
    <h2>거래 내역</h2>
    <div class="add-form">
      <input type="date" id="input-date">
      <input type="text" id="input-desc" placeholder="내용">
      <select id="input-category">
        <option value="식비">식비</option>
        <option value="교통">교통</option>
        <option value="쇼핑">쇼핑</option>
        <option value="의료">의료</option>
        <option value="급여">급여</option>
        <option value="기타">기타</option>
      </select>
      <select id="input-type">
        <option value="income">수입</option>
        <option value="expense">지출</option>
      </select>
      <input type="number" id="input-amount" placeholder="금액">
      <button type="button" onclick="addTransaction()">추가</button>
    </div>
    <table>
      <thead>
        <tr>
          <th>날짜</th>
          <th>내용</th>
          <th>카테고리</th>
          <th>구분</th>
          <th>금액</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="transaction-list"></tbody>
    </table>
  </div>

  <div class="chart-section">
    <h2>카테고리별 지출</h2>
    <div id="category-chart"></div>
  </div>
</div>

<script>
  const user = JSON.parse(localStorage.getItem('user') || 'null');
  if (!user) window.location.href = '/login.html';
  else document.getElementById('user-name').textContent = user.name + '님';

  function logout() {
    localStorage.removeItem('user');
    window.location.href = '/';
  }

  let transactions = JSON.parse(localStorage.getItem('transactions') || '[]');

  function formatMoney(n) {
    return n.toLocaleString('ko-KR') + ' 원';
  }

  function setDate() {
    document.getElementById('input-date').value = new Date().toISOString().split('T')[0];
  }

  function render() {
    const list = document.getElementById('transaction-list');
    list.innerHTML = '';
    let income = 0, expense = 0;
    const categoryMap = {};

    transactions.forEach((t, i) => {
      if (t.type === 'income') income += t.amount;
      else {
        expense += t.amount;
        categoryMap[t.category] = (categoryMap[t.category] || 0) + t.amount;
      }

      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td>${t.date}</td>
        <td>${t.desc}</td>
        <td>${t.category}</td>
        <td class="type-${t.type}">${t.type === 'income' ? '수입' : '지출'}</td>
        <td>${formatMoney(t.amount)}</td>
        <td><button type="button" class="delete-btn" onclick="deleteTransaction(${i})">✕</button></td>
      `;
      list.appendChild(tr);
    });

    document.getElementById('total-income').textContent = formatMoney(income);
    document.getElementById('total-expense').textContent = formatMoney(expense);
    document.getElementById('total-balance').textContent = formatMoney(income - expense);
    renderChart(categoryMap, expense);
  }

  function renderChart(categoryMap, total) {
    const chart = document.getElementById('category-chart');
    chart.innerHTML = '';
    if (total === 0) {
      chart.innerHTML = '<p style="color:#aaa;font-size:14px;">지출 내역이 없습니다.</p>';
      return;
    }
    Object.entries(categoryMap).sort((a, b) => b[1] - a[1]).forEach(([cat, amt]) => {
      const pct = Math.round((amt / total) * 100);
      chart.innerHTML += `
        <div class="category-bar">
          <div class="label"><span>${cat}</span><span>${formatMoney(amt)} (${pct}%)</span></div>
          <div class="bar-bg"><div class="bar-fill" style="width:${pct}%"></div></div>
        </div>
      `;
    });
  }

  function addTransaction() {
    const date = document.getElementById('input-date').value;
    const desc = document.getElementById('input-desc').value.trim();
    const category = document.getElementById('input-category').value;
    const type = document.getElementById('input-type').value;
    const amount = parseInt(document.getElementById('input-amount').value);

    if (!date || !desc || !amount || amount <= 0) {
      alert('날짜, 내용, 금액을 모두 입력해주세요.');
      return;
    }

    transactions.unshift({ date, desc, category, type, amount });
    localStorage.setItem('transactions', JSON.stringify(transactions));
    document.getElementById('input-desc').value = '';
    document.getElementById('input-amount').value = '';
    render();
  }

  function deleteTransaction(i) {
    transactions.splice(i, 1);
    localStorage.setItem('transactions', JSON.stringify(transactions));
    render();
  }

  setDate();
  render();
</script>

</body>
</html>
